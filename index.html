<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سيف للاستثمار — تحليل الاستثمار الجريء</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0a0b10; --bg2: #12131c; --bg3: #1a1c2e; --bg4: #242842;
  --text: #e8eaf0; --text2: #9ca3bf; --text3: #6b7294;
  --accent: #6c5ce7; --accent2: #a29bfe;
  --green: #00cec9; --green2: #55efc4;
  --red: #ff6b6b; --orange: #f97316; --yellow: #fdcb6e;
  --blue: #3b82f6; --pink: #fd79a8;
  --radius: 14px; --radius2: 8px;
  --sidebar-w: 230px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

/* Sidebar */
.sidebar { width: var(--sidebar-w); background: var(--bg2); border-left: 1px solid var(--bg3); position: fixed; top: 0; right: 0; height: 100vh; display: flex; flex-direction: column; z-index: 100; }
.sidebar .logo { padding: 20px; border-bottom: 1px solid var(--bg3); }
.sidebar .logo h2 { font-size: 1.3em; color: var(--accent2); display: flex; align-items: center; gap: 8px; }
.sidebar .logo small { color: var(--text3); font-size: .8em; display: block; margin-top: 4px; }
.sidebar nav { flex: 1; padding: 10px 0; overflow-y: auto; }
.sidebar nav a { display: flex; align-items: center; gap: 10px; padding: 12px 20px; color: var(--text2); text-decoration: none; font-size: .95em; font-weight: 500; cursor: pointer; transition: all .15s; }
.sidebar nav a:hover, .sidebar nav a.active { background: var(--bg3); color: var(--text); }
.sidebar nav a .icon { font-size: 1.15em; width: 24px; text-align: center; }
.sidebar .meta { padding: 14px 20px; border-top: 1px solid var(--bg3); font-size: .78em; color: var(--text3); }
.sidebar .meta b { color: var(--green); }

/* Main */
.main { margin-right: var(--sidebar-w); flex: 1; padding: 24px 28px; min-height: 100vh; }
.page { display: none; }
.page.active { display: block; }
.page-title { font-size: 1.5em; font-weight: 800; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }

/* KPI Cards */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 12px; margin-bottom: 24px; }
.kpi { background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius); padding: 18px; text-align: center; transition: border-color .2s; }
.kpi:hover { border-color: var(--accent); }
.kpi .val { font-size: 1.8em; font-weight: 800; }
.kpi .lbl { font-size: .82em; color: var(--text2); margin-top: 4px; }

/* Cards */
.card { background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius); padding: 18px; margin-bottom: 12px; transition: border-color .2s; }
.card:hover { border-color: var(--accent); }
.card h3 { font-size: 1.05em; font-weight: 700; margin-bottom: 6px; }
.card p { color: var(--text2); font-size: .88em; line-height: 1.6; }

/* Grid layouts */
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-bottom: 20px; }

/* Score bar */
.score-bar { height: 8px; background: var(--bg4); border-radius: 4px; overflow: hidden; flex: 1; }
.score-fill { height: 100%; border-radius: 4px; transition: width .4s; }
.score-row { display: flex; align-items: center; gap: 8px; margin: 4px 0; font-size: .85em; }
.score-row .lbl { width: 90px; color: var(--text2); }
.score-row .num { width: 30px; text-align: center; font-weight: 700; }

/* Tags */
.tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: .75em; font-weight: 600; }
.tag-high { background: rgba(0,206,201,.15); color: var(--green); }
.tag-medium { background: rgba(253,203,110,.15); color: var(--yellow); }
.tag-low { background: rgba(249,115,22,.15); color: var(--orange); }
.tag-avoid { background: rgba(255,107,107,.15); color: var(--red); }
.source-dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-inline-start: 6px; }

/* Table */
.tbl { width: 100%; border-collapse: collapse; font-size: .88em; }
.tbl th { background: var(--bg3); padding: 10px 12px; text-align: right; font-weight: 600; color: var(--text2); font-size: .82em; }
.tbl td { padding: 10px 12px; border-bottom: 1px solid var(--bg3); }
.tbl tr:hover td { background: var(--bg3); }
.tbl tr { cursor: pointer; }

/* Risk flags */
.flag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 20px; font-size: .75em; font-weight: 600; margin: 2px; }
.flag-red { background: rgba(255,107,107,.15); color: var(--red); }
.flag-orange { background: rgba(249,115,22,.15); color: var(--orange); }
.flag-yellow { background: rgba(253,203,110,.15); color: var(--yellow); }

/* Modal */
.modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.7); z-index: 200; justify-content: center; align-items: flex-start; padding-top: 5vh; }
.modal-overlay.show { display: flex; }
.modal { background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius); width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 28px; }
.modal-close { float: left; background: none; border: none; color: var(--text3); font-size: 1.5em; cursor: pointer; }
.modal-close:hover { color: var(--red); }

/* Filters */
.filters { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 18px; align-items: center; }
.filters select, .filters input { background: var(--bg3); border: 1px solid var(--bg4); color: var(--text); padding: 8px 12px; border-radius: var(--radius2); font-family: 'Tajawal'; font-size: .88em; }
.filters input { min-width: 200px; }

/* Alerts */
.alert-list { margin-bottom: 20px; }
.alert { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius2); margin-bottom: 6px; font-size: .88em; }

/* Import page */
.import-zone { border: 2px dashed var(--bg4); border-radius: var(--radius); padding: 40px; text-align: center; cursor: pointer; transition: border-color .2s, background .2s; margin-bottom: 18px; }
.import-zone:hover, .import-zone.dragover { border-color: var(--accent); background: var(--bg3); }
.import-zone input[type=file] { display: none; }
.import-tabs { display: flex; gap: 0; margin-bottom: 18px; }
.import-tab { padding: 10px 20px; background: var(--bg2); border: 1px solid var(--bg3); color: var(--text2); cursor: pointer; font-family: 'Tajawal'; font-size: .9em; font-weight: 600; transition: all .15s; }
.import-tab:first-child { border-radius: 0 var(--radius2) var(--radius2) 0; }
.import-tab:last-child { border-radius: var(--radius2) 0 0 var(--radius2); }
.import-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
.import-preview { background: var(--bg2); border: 1px solid var(--bg3); border-radius: var(--radius); padding: 16px; margin-top: 14px; max-height: 400px; overflow-y: auto; }
.import-preview pre { font-size: .82em; color: var(--text2); white-space: pre-wrap; direction: ltr; text-align: left; }
.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: .88em; font-weight: 600; color: var(--text2); margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea { width: 100%; background: var(--bg3); border: 1px solid var(--bg4); color: var(--text); padding: 10px; border-radius: var(--radius2); font-family: 'Tajawal'; font-size: .9em; }
.form-group textarea { min-height: 80px; resize: vertical; }
.btn { padding: 10px 22px; border: none; border-radius: var(--radius2); cursor: pointer; font-family: 'Tajawal'; font-size: .9em; font-weight: 700; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { background: var(--accent2); }
.btn-success { background: var(--green); color: #000; }
.import-log { margin-top: 14px; font-size: .85em; }
.import-log .log-ok { color: var(--green); }
.import-log .log-warn { color: var(--yellow); }
.import-log .log-err { color: var(--red); }
</style>
</head>
<body>

<!-- ===== PLACEHOLDER STRUCTURE ===== -->

<!-- SIDEBAR -->
<div class="sidebar" id="sidebar"></div>

<!-- MAIN -->
<div class="main">
  <div class="page active" id="page-dashboard"></div>
  <div class="page" id="page-sectors"></div>
  <div class="page" id="page-companies"></div>
  <div class="page" id="page-opportunities"></div>
  <div class="page" id="page-reports"></div>
  <div class="page" id="page-recommendations"></div>
  <div class="page" id="page-sources"></div>
  <div class="page" id="page-import"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modal-content"></div>
</div>

<script src="app.js"></script>
<script>
// ══════════════════════════════════════
// CHUNK 2: SIDEBAR + NAVIGATION
// ══════════════════════════════════════

function renderSidebar() {
  const pages = [
    { id: 'dashboard', icon: '📊', label: 'لوحة التحكم' },
    { id: 'sectors', icon: '🏷️', label: 'القطاعات' },
    { id: 'companies', icon: '🏢', label: 'الشركات' },
    { id: 'opportunities', icon: '💎', label: 'الفرص' },
    { id: 'reports', icon: '📄', label: 'التقارير' },
    { id: 'recommendations', icon: '👑', label: 'التوصيات التنفيذية' },
    { id: 'sources', icon: '📁', label: 'مصادر البيانات' },
    { id: 'import', icon: '📥', label: 'استيراد بيانات' }
  ];

  document.getElementById('sidebar').innerHTML = `
    <div class="logo">
      <h2>⚔️ سيف للاستثمار</h2>
      <small>تحليل الاستثمار الجريء — السعودية</small>
      <small style="color:var(--text3);font-size:.7em;margin-top:2px">منصة خاصة (أبوسيف)</small>
    </div>
    <nav>
      ${pages.map(p => `<a data-page="${p.id}" onclick="showPage('${p.id}')" class="${p.id === 'dashboard' ? 'active' : ''}">
        <span class="icon">${p.icon}</span> ${p.label}
      </a>`).join('')}
    </nav>
    <div class="meta">
      <div>شركات: <b>${DATA.companies.length}</b> | جولات: <b>${DATA.rounds.length}</b></div>
      <div style="margin-top:4px">آخر تحديث: ${formatDate(DATA.meta.lastUpdated)}</div>
    </div>
  `;
}

function showPage(pageId) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + pageId).classList.add('active');
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.remove('active'));
  document.querySelector(`[data-page="${pageId}"]`).classList.add('active');

  // Render on demand
  const renderers = {
    dashboard: renderDashboard,
    sectors: renderSectors,
    companies: renderCompanies,
    opportunities: renderOpportunities,
    reports: renderReports,
    recommendations: renderRecommendations,
    sources: renderSources,
    import: renderImport
  };
  if (renderers[pageId]) renderers[pageId]();
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('show');
}

// ══════════════════════════════════════
// CHUNK 3: DASHBOARD
// ══════════════════════════════════════

function renderDashboard() {
  const total = getTotalFunding();
  const highOps = getHighOpportunities();
  const recent = getRecentRounds(5);
  const topSec = getTopSectors(5);
  const flags = getAllRiskFlags();

  document.getElementById('page-dashboard').innerHTML = `
    <div class="page-title">📊 لوحة التحكم</div>

    <div class="kpi-grid">
      <div class="kpi"><div class="val" style="color:var(--accent2)">${DATA.companies.length}</div><div class="lbl">شركة ناشئة</div></div>
      <div class="kpi"><div class="val" style="color:var(--blue)">${DATA.rounds.length}</div><div class="lbl">جولة تمويل</div></div>
      <div class="kpi"><div class="val" style="color:var(--green)">${formatMoney(total)}</div><div class="lbl">إجمالي التمويل</div></div>
      <div class="kpi"><div class="val" style="color:var(--yellow)">${DATA.sectors.length}</div><div class="lbl">قطاع</div></div>
      <div class="kpi"><div class="val" style="color:var(--green2)">${highOps.length}</div><div class="lbl">فرصة جاذبة 🟢</div></div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>🕐 آخر الجولات</h3>
        <table class="tbl" style="margin-top:10px">
          <thead><tr><th>الشركة</th><th>النوع</th><th>المبلغ</th><th>التاريخ</th></tr></thead>
          <tbody>
            ${recent.map(r => {
              const co = DATA.companies.find(c => c.id === r.companyId);
              return `<tr onclick="showCompanyModal('${r.companyId}')">
                <td>${co ? co.nameAr : r.companyId}</td>
                <td>${getStageAr(r.type)}</td>
                <td>${formatMoney(r.amountUSD)}</td>
                <td style="color:var(--text3)">${formatDate(r.date)}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>

      <div class="card">
        <h3>⭐ أعلى القطاعات تقييماً</h3>
        <div style="margin-top:12px">
          ${topSec.map(s => `
            <div class="score-row">
              <span class="lbl">${s.icon} ${s.nameAr}</span>
              ${scoreBar(s.scoring.totalScore)}
              <span class="num">${s.scoring.totalScore}</span>
              <span>${getRatingEmoji(s.scoring.rating)}</span>
            </div>
          `).join('')}
        </div>
      </div>
    </div>

    <div class="grid-2">
      <div class="card">
        <h3>💎 أبرز الفرص</h3>
        <div style="margin-top:10px">
          ${getTopCompanies(5).map(c => `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg3);cursor:pointer" onclick="showCompanyModal('${c.id}')">
              <div>
                <div><span style="font-weight:700">${c.nameAr}</span> <span style="color:var(--text3);font-size:.8em;margin-right:8px">${getSector(c.sectorId)?.icon || ''} ${getSector(c.sectorId)?.nameAr || ''}</span> ${sourceBadge(c.source,'sm')}</div>
                <div style="font-size:.78em;color:var(--text3);margin-top:2px">${explainCompanyScore(c).substring(0, 80)}${explainCompanyScore(c).length > 80 ? '...' : ''}</div>
              </div>
              <div style="display:flex;align-items:center;gap:6px">
                <span style="font-weight:700">${c.scoring.totalScore}</span>
                <span>${getRatingEmoji(c.scoring.rating)}</span>
              </div>
            </div>
          `).join('')}
        </div>
      </div>

      <div class="card">
        <h3>🚩 تنبيهات (${flags.length})</h3>
        <div class="alert-list" style="margin-top:10px;max-height:250px;overflow-y:auto">
          ${flags.length === 0 ? '<p style="color:var(--text3)">لا تنبيهات ✅</p>' :
            flags.map(f => {
              const entityObj = f.entityType === 'company' ? DATA.companies.find(c => c.nameAr === f.entity) : DATA.sectors.find(s => s.nameAr === f.entity);
              const srcHtml = entityObj && entityObj.source ? sourceBadge(entityObj.source, 'sm') : '';
              return `<div class="alert">
                <span class="flag flag-${f.type}">${f.icon || '⚠️'} ${f.label}</span>
                <span style="color:var(--text3);font-size:.82em">${f.entity} (${f.entityType === 'company' ? 'شركة' : 'قطاع'})</span>
                ${srcHtml}
              </div>`;
            }).join('')}
        </div>
      </div>
    </div>
  `;
}

function renderRecommendations() {
  const topSectors = getTopSectors(3);
  const topCompanies = getTopCompanies(5);
  const gaps = getMarketGaps();
  const crowded = getCrowdedSectors();
  const undervalued = getUndervaluedCompanies();
  const risky = getRiskyBets();
  const allFlags = getAllRiskFlags();
  const redFlags = allFlags.filter(f => f.type === 'red');
  const orangeFlags = allFlags.filter(f => f.type === 'orange');

  document.getElementById('page-recommendations').innerHTML = `
    <div class="page-title">👑 التوصيات التنفيذية</div>
    <p style="color:var(--text2);margin-bottom:20px;font-size:.95em;line-height:1.7">
      تحليل مبني على <b>${DATA.companies.length}</b> شركة و <b>${DATA.rounds.length}</b> جولة تمويل من
      ${DATA.sources.filter(s => DATA.companies.some(c => c.source === s.id)).map(s => `${s.icon} ${s.nameAr}`).join('، ')}.
      التوصيات مولّدة تلقائياً من نظام التقييم المرجّح.
    </p>

    <!-- أفضل القطاعات -->
    <div class="card" style="border-color:var(--green);margin-bottom:16px">
      <h3 style="color:var(--green);font-size:1.15em">🏆 أفضل القطاعات للاستثمار</h3>
      <p style="color:var(--text3);font-size:.85em;margin-bottom:14px">القطاعات الأعلى جاذبية بناءً على حجم السوق، النمو، النشاط الاستثماري، والدعم الحكومي</p>
      ${topSectors.map((s, i) => `
        <div style="padding:14px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:10px">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="font-size:1.3em;font-weight:800;color:${i === 0 ? 'var(--green)' : 'var(--text)'}">${i === 0 ? '🥇' : i === 1 ? '🥈' : '🥉'} ${s.icon} ${s.nameAr}</span>
              <span style="color:var(--text3);font-size:.85em;margin-right:8px">${s.nameEn}</span>
            </div>
            <div style="text-align:center">
              <div style="font-size:1.5em;font-weight:800;color:${getRatingColor(s.scoring.rating)}">${s.scoring.totalScore}</div>
              <span class="tag tag-${s.scoring.rating}" style="font-size:.7em">${getRatingAr(s.scoring.rating)}</span>
            </div>
          </div>
          <div style="margin-top:10px;font-size:.88em;color:var(--text2);line-height:1.7">
            📝 <b>التحليل:</b> ${explainSectorScore(s)}
          </div>
          <div style="margin-top:8px;font-size:.85em;color:var(--text2)">
            <b>لماذا نوصي بهذا القطاع؟</b>
            ${s.scoring.tam >= 4 ? ' سوق كبير يستوعب لاعبين جدد.' : ''}
            ${s.scoring.growth >= 4 ? ' نمو سريع يعني عوائد أعلى على المدى القريب.' : ''}
            ${s.scoring.vision2030 >= 4 ? ' دعم حكومي وتنظيمي يقلل المخاطر.' : ''}
            ${s.scoring.competition >= 4 ? ' منافسة محدودة — فرصة تموضع مبكر.' : ''}
            ${s.scoring.deals >= 4 ? ' نشاط استثماري عالي يدل على ثقة السوق.' : ''}
          </div>
          ${s.scoring.riskFlags.length > 0 ? `<div style="margin-top:8px">${s.scoring.riskFlags.map(f => `<span class="flag flag-${f.type}">⚠️ ${f.label}</span>`).join('')}</div>` : ''}
        </div>
      `).join('')}
    </div>

    <!-- أفضل الشركات المرشحة -->
    <div class="card" style="border-color:var(--accent);margin-bottom:16px">
      <h3 style="color:var(--accent2);font-size:1.15em">💎 أفضل الشركات المرشحة للاستثمار</h3>
      <p style="color:var(--text3);font-size:.85em;margin-bottom:14px">الشركات الأعلى تقييماً بناءً على الفريق، النمو، نموذج العمل، والمستثمرين</p>
      ${topCompanies.map((c, i) => {
        const sec = getSector(c.sectorId);
        return `
        <div style="padding:14px;background:var(--bg3);border-radius:var(--radius2);margin-bottom:10px;cursor:pointer" onclick="showCompanyModal('${c.id}')">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div>
              <span style="font-weight:800;font-size:1.05em">${i + 1}. ${c.nameAr}</span>
              <span style="color:var(--text3);font-size:.82em;margin-right:6px">${sec?.icon} ${sec?.nameAr} | ${getStageAr(c.stage)} | ${formatMoney(c.scoring.totalFunding)}</span>
              ${sourceBadge(c.source,'sm')}
            </div>
            <div style="font-size:1.4em;font-weight:800;color:${getRatingColor(c.scoring.rating)}">${c.scoring.totalScore} ${getRatingEmoji(c.scoring.rating)}</div>
          </div>
          <div style="margin-top:8px;font-size:.88em;color:var(--text2);line-height:1.7">
            <b>سبب التوصية:</b> ${c.opportunitySummary || explainCompanyScore(c)}
          </div>
          ${c.scoring.riskFlags.length > 0 ? `<div style="margin-top:6px">${c.scoring.riskFlags.map(f => `<span class="flag flag-${f.type}">${f.icon} ${f.label}</span>`).join('')}</div>` : ''}
        </div>
        `;
      }).join('')}
    </div>

    <div class="grid-2">
      <!-- الفجوات السوقية -->
      <div class="card" style="border-color:var(--yellow)">
        <h3 style="color:var(--yellow);font-size:1.1em">🔍 الفجوات السوقية — فرص غير مستغلة</h3>

// ── Import UI helpers ──

let _pendingImportData = null;

function switchImportTab(tab, el) {
  document.querySelectorAll('.import-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.querySelectorAll('.import-section').forEach(s => s.style.display = 'none');
  document.getElementById('import-' + tab).style.display = '';
}

function handleFileDrop(e) {
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
}

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processFile(file);
}

function processFile(file) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const text = e.target.result;
    let parsed;

    if (file.name.endsWith('.json')) {
      try {
        const json = JSON.parse(text);
        parsed = { headers: Object.keys(json[0] || {}), rows: json };
      } catch { parsed = { headers: [], rows: [], error: 'JSON غير صالح' }; }
    } else {
      parsed = parseCSV(text);
    }

    if (parsed.error) {
      document.getElementById('import-log').innerHTML = `<div class="log-err">❌ ${parsed.error}</div>`;
      return;
    }

    _pendingImportData = parsed;
    document.getElementById('import-preview-area').style.display = '';
    document.getElementById('preview-info').textContent = `📊 ${parsed.rows.length} سجل | ${parsed.headers.length} عمود | ${file.name}`;

    // Show preview table
    const maxPreview = Math.min(parsed.rows.length, 5);
    let html = '<table class="tbl"><thead><tr>' + parsed.headers.map(h => `<th>${h}</th>`).join('') + '</tr></thead><tbody>';
    for (let i = 0; i < maxPreview; i++) {
      html += '<tr style="cursor:default">' + parsed.headers.map(h => `<td>${parsed.rows[i][h] || ''}</td>`).join('') + '</tr>';
    }
    html += '</tbody></table>';
    if (parsed.rows.length > 5) html += `<div style="color:var(--text3);font-size:.82em;margin-top:8px">... و ${parsed.rows.length - 5} سجل آخر</div>`;
    document.getElementById('preview-table').innerHTML = html;
  };
  reader.readAsText(file);
}

function executeImport() {
  if (!_pendingImportData) return;
  const sourceId = document.getElementById('imp-source').value;
  const importType = document.getElementById('imp-type').value;
  const mapKey = FIELD_MAPS[sourceId] ? sourceId : 'generic';
  const fieldMap = FIELD_MAPS[mapKey][importType === 'companies' ? 'company' : 'round'];

  let log;
  if (importType === 'companies') {
    log = importCompanies(_pendingImportData.rows, sourceId, fieldMap);
  } else {
    log = importRounds(_pendingImportData.rows, sourceId, fieldMap);
  }

  document.getElementById('import-log').innerHTML = log.map(l =>
    `<div class="log-${l.type}">${l.msg}</div>`
  ).join('');

  _pendingImportData = null;
  document.getElementById('import-preview-area').style.display = 'none';

  // Refresh sidebar counts
  renderSidebar();
}

function clearImport() {
  _pendingImportData = null;
  document.getElementById('import-preview-area').style.display = 'none';
  document.getElementById('import-log').innerHTML = '';
}

function downloadTemplate(type) {
  const templates = {
    'magnitt-companies': 'Company Name,Company Name (Arabic),Sector,Stage,Founded,City,Website,Employees,Description,Founders\nTamara,تمارا,Fintech,Series C+,2020,Riyadh,https://tamara.co,350,"BNPL platform",Abdulmajeed Al-Sikhan',
    'magnitt-rounds': 'Company Name,Round Type,Amount (USD),Date,Lead Investor,Investors\nTamara,Series C+,340000000,2025-01-15,Sanabil Investments,"Sanabil, SNB Capital"',
    'svc-companies': 'اسم الشركة,Company,القطاع,المرحلة,سنة التأسيس,المدينة\nتمارا,Tamara,تقنية مالية,Series C+,2020,الرياض',
    'generic-companies': 'nameEn,nameAr,sector,stage,founded,city,website,description\nTamara,تمارا,fintech,series-c+,2020,الرياض,https://tamara.co,BNPL platform'
  };

  const content = templates[type] || '';
  const blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = type + '.csv'; a.click();
  URL.revokeObjectURL(url);
}

function filterOpps() {
  const rating = document.getElementById('opp-rating').value;

  const stage = document.getElementById('opp-stage').value;
  const noRisk = document.getElementById('opp-norisk').checked;

  let companies = [...DATA.companies].sort((a, b) => b.scoring.totalScore - a.scoring.totalScore);

  companies = companies.filter(c => {
    if (rating === 'high' && c.scoring.rating !== 'high') return false;
    if (rating === 'medium-up' && (c.scoring.rating === 'low' || c.scoring.rating === 'avoid')) return false;

  if (!a || !b) return;
  const keys = [
    { key: 'stage', label: 'المرحلة' }, { key: 'businessModel', label: 'نموذج العمل' },

    </div>

    ${sc.riskFlags.length > 0 ? `<div style="margin-bottom:14px">${sc.riskFlags.map(f => `<span class="flag flag-${f.type}">${f.icon} ${f.label}</span>`).join('')}</div>` : ''}

    <div style="background:var(--bg3);padding:12px;border-radius:var(--radius2);margin-bottom:16px;font-size:.85em;color:var(--text2);line-height:1.7">
      📝 ${explainCompanyScore(c)}
    </div>

    <h3 style="margin-bottom:10px">📊 تفصيل الدرجات</h3>
    ${labels.map(l => `
      <div class="score-row">
        <span class="lbl">${l.label}</span>
        ${scoreBar(sc[l.key] || 0)}
        <span class="num">${sc[l.key] || 0}</span>
      </div>
    `).join('')}

    <h3 style="margin:18px 0 10px">💰 تاريخ التمويل</h3>
    ${rounds.length === 0 ? '<p style="color:var(--text3)">لا جولات مسجلة</p>' : `
      <table class="tbl">
        <thead><tr><th>النوع</th><th>المبلغ</th><th>التاريخ</th><th>المستثمر القائد</th></tr></thead>
        <tbody>
          ${rounds.map(r => {
            const lead = r.leadInvestorId ? getInvestor(r.leadInvestorId) : null;
            return `<tr style="cursor:default">
              <td>📍 ${getStageAr(r.type)}</td>
              <td style="font-weight:700">${formatMoney(r.amountUSD)}</td>
              <td style="color:var(--text3)">${formatDate(r.date)}</td>
              <td>${lead ? lead.nameAr : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    `}

    ${c.founders?.length ? `<h3 style="margin:18px 0 8px">👥 المؤسسون</h3><p>${c.founders.join('، ')}</p>` : ''}

    ${c.opportunitySummary ? `<h3 style="margin:18px 0 8px">💎 لماذا فرصة جيدة؟</h3><p style="color:var(--green2);line-height:1.7">${c.opportunitySummary}</p>` : ''}

    <p style="color:var(--text2);font-size:.85em;line-height:1.7;margin-top:14px">${c.description || ''}</p>

    <div style="margin-top:18px;padding-top:14px;border-top:1px solid var(--bg3)">
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px">
        <button class="btn btn-primary" style="font-size:.82em;padding:6px 14px" onclick="closeModal();aiAnalyzeCompany('${c.id}')">🤖 تحليل AI</button>
        <button class="btn" style="font-size:.82em;padding:6px 14px;background:var(--bg4);color:var(--text)" onclick="closeModal();aiInvestmentMemo('${c.id}')">📝 Investment Memo</button>
        <button class="btn" style="font-size:.82em;padding:6px 14px;background:var(--bg4);color:var(--text)" onclick="closeModal();aiRiskAssessment('${c.id}')">🚩 تقييم المخاطر</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:.82em;color:var(--text3)">المصدر: ${src.nameAr} <span class="source-dot" style="background:${src.color}"></span></span>
        ${c.website ? `<a href="${c.website}" target="_blank" style="color:var(--accent2);font-size:.85em">${c.nameEn} ↗</a>` : ''}
      </div>
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('show');
}

// AI ACTION HANDLERS
// ══════════════════════════════════════

async function aiAnalyzeCompany(id) {
  const c = DATA.companies.find(x => x.id === id);
  if (!c) return;
  showAIResult(`🤖 تحليل — ${c.nameAr}`, '⏳ جاري التحليل...', 'loading');
  const result = await requestAI(AI_USE_CASES.COMPANY_ANALYSIS, c);
  showAIResult(`🤖 تحليل — ${c.nameAr}`, result.text, result.source);
}

async function aiInvestmentMemo(id) {
  const c = DATA.companies.find(x => x.id === id);
  if (!c) return;
  showAIResult(`📝 Investment Memo — ${c.nameAr}`, '⏳ جاري الكتابة...', 'loading');
  const result = await requestAI(AI_USE_CASES.INVESTMENT_MEMO, c);
  showAIResult(`📝 Investment Memo — ${c.nameAr}`, result.text, result.source);
}

async function aiRiskAssessment(id) {
  const c = DATA.companies.find(x => x.id === id);
  if (!c) return;
  showAIResult(`🚩 تقييم المخاطر — ${c.nameAr}`, '⏳ جاري التقييم...', 'loading');
  const result = await requestAI(AI_USE_CASES.RISK_ASSESSMENT, c);
  showAIResult(`🚩 تقييم المخاطر — ${c.nameAr}`, result.text, result.source);
}

async function aiAnalyzeSector(id) {
  const s = DATA.sectors.find(x => x.id === id);
  if (!s) return;
  showAIResult(`🤖 تحليل قطاع — ${s.nameAr}`, '⏳ جاري التحليل...', 'loading');
  const result = await requestAI(AI_USE_CASES.SECTOR_ANALYSIS, s);
  showAIResult(`🤖 تحليل قطاع — ${s.nameAr}`, result.text, result.source);
}

async function aiCompareCompanies() {
  const a = DATA.companies.find(c => c.id === document.getElementById('cmp-a').value);
  const b = DATA.companies.find(c => c.id === document.getElementById('cmp-b').value);
  if (!a || !b) return;
  showAIResult(`⚖️ مقارنة — ${a.nameAr} vs ${b.nameAr}`, '⏳ جاري المقارنة...', 'loading');
  const result = await requestAI(AI_USE_CASES.COMPARE_COMPANIES, a, b);
  showAIResult(`⚖️ مقارنة — ${a.nameAr} vs ${b.nameAr}`, result.text, result.source);
}
